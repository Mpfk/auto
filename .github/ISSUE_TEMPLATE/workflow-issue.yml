---
name: Feature / Bug / Task
description: Standard issue template for the multi-agent workflow
labels: ["status/draft"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Additional context and details.
  - type: textarea
    id: research
    attributes:
      label: Research
      description: "Filled in by research agents. Sections: Key Findings, Constraints, Open Questions."
  - type: textarea
    id: plan
    attributes:
      label: Plan
      description: Filled in by orchestrator after research synthesis.
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Specific, testable criteria for completion.
  - type: textarea
    id: retrospective
    attributes:
      label: Retrospective
      description: Iteration notes, learnings, and Gate 2 feedback.
