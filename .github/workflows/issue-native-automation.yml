name: Issue Native Automation

on:
  issues:
    types: [labeled, assigned]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  branch-and-kickoff:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Create issue branch when moved to ready
        if: github.event.action == 'labeled' && github.event.label.name == 'status/ready'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const branch = `issue/${issue.number}`;

            const defaultBranch = (await github.rest.repos.get({ owner, repo })).data.default_branch;
            const ref = (await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` })).data;

            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            } catch {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branch}`,
                sha: ref.object.sha,
              });
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: `Branch ready: ${branch}. Assign Copilot to this issue to begin implementation.`
            });

      - name: Move to in-progress when Copilot is assigned on ready issue
        if: github.event.action == 'assigned'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const assignees = (issue.assignees || []).map((a) => a.login.toLowerCase());
            const isCopilotAssigned = assignees.some((a) => a.includes('copilot'));
            if (!isCopilotAssigned) return;

            const labels = (issue.labels || []).map((l) => l.name);
            if (!labels.includes('status/ready')) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: 'Copilot assignment detected, but issue is not status/ready. Approve the plan first.',
              });
              return;
            }

            if (!labels.includes('status/in-progress')) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ['status/in-progress'],
              });
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: [
                'Implementation kickoff:',
                '- Use branch issue/' + issue.number,
                '- Run TDD agent per independently testable task',
                '- Keep docs updated in docs/',
                '- Open PR to main when tasks are complete',
              ].join('\n'),
            });

  comment-commands:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Handle lightweight workflow commands
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            if (!issue || issue.pull_request) return;

            const body = (context.payload.comment?.body || '').trim().toLowerCase();
            const actor = context.payload.comment?.user?.login || 'unknown';

            if (body === '/auto plan-approved') {
              const labels = (issue.labels || []).map((l) => l.name);
              if (labels.includes('status/planning')) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: 'status/planning' }).catch(() => {});
              }
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ['status/ready'],
              });
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Plan approved by @${actor}. Status moved to status/ready.`,
              });
            }
