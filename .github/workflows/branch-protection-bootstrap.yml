name: Branch Protection Bootstrap

on:
  workflow_dispatch:

permissions:
  administration: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Apply branch protection to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';

            await github.request('PUT /repos/{owner}/{repo}/branches/{branch}/protection', {
              owner,
              repo,
              branch,
              required_status_checks: {
                strict: true,
                contexts: [
                  'Workflow Policy / policy',
                  'Test Suite / test',
                  'Conventional Commits Check / check-commits'
                ]
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              required_conversation_resolution: true
            });

            core.info('Branch protection updated for main.');
