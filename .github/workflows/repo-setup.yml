name: Repo Setup

# Runs automatically on every push to main so that a fresh template clone
# gets labels and branch protection applied without any manual steps.
# Safe to run repeatedly — all operations are idempotent.

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  issues: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install YAML parser
        run: npm install js-yaml

      - name: Sync labels from .github/labels.yml
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const config = yaml.load(fs.readFileSync('.github/labels.yml', 'utf8'));
            const labels = config.labels || [];

            for (const label of labels) {
              const name = label.name;
              const color = (label.color || 'ededed').replace('#', '');
              const description = label.description || '';

              try {
                await github.rest.issues.getLabel({ owner, repo, name });
                await github.rest.issues.updateLabel({ owner, repo, name, new_name: name, color, description });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            }

            core.info(`Synced ${labels.length} labels.`);

      - name: Apply branch protection to main
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';

            await github.request('PUT /repos/{owner}/{repo}/branches/{branch}/protection', {
              owner,
              repo,
              branch,
              required_status_checks: {
                strict: true,
                contexts: [
                  'Workflow Policy / policy',
                  'Test Suite / test',
                  'Conventional Commits Check / check-commits'
                ]
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              required_conversation_resolution: true
            });

            core.info('Branch protection applied to main.');
