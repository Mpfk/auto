# workflow.conf — Project-specific workflow configuration
# Sourced by .githooks/ scripts to stay language/framework agnostic.
# Customize these values for your project.

# Test command — the command that runs your full test suite
# Examples: "pytest", "go test ./...", "cargo test", "dotnet test", "mvn test"
TEST_CMD="npm test"

# Source directories — where implementation code lives (space-separated)
# Used by hooks to detect source changes vs test changes
SRC_DIRS="src/ lib/"

# Test directories — where test files live (space-separated)
# Used by hooks to verify TDD cycle compliance
TEST_DIRS="tests/ test/"

# Main branch name — the protected branch that requires issue-based workflow
MAIN_BRANCH="main"
